name: Deploy Milkman

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            echo "Starting Milkman deployment"

            cd ~/projects/sahil_final_milkman

            echo "Pull latest code"
            git fetch origin master
            git reset --hard origin/master

            echo "Updating backend"
            cd backend
            source sahil_env/bin/activate
            pip install -r requirements.txt
            pm2 restart milkman-backend

            echo "Updating frontend"
            cd ../frontend
            npm install
            npm run build -- --emptyOutDir

            pm2 delete milkman-frontend || true
            pm2 start "npx serve -s dist -l 4173" --name milkman-frontend
            pm2 save

            echo "Deployment finished"
